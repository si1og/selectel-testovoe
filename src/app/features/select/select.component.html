
<ul>
  @for (item of menuItems(); track item.id) {
  <li>
      <input type="checkbox" [checked]="item.selected" [id]="`item-${item.id}`" (change)="menuStateService.toggleItem(item.id)" />
      <label [for]="`item-${item.id}`" class="checkbox-data">
        <div>{{ item.name }}</div>
        <span>Value: {{ item.value }}</span>
      </label>
  </li>
  }
</ul>
